services:
  - type: web
    name: project-management
    runtime: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: WEBROOT
        value: /var/www/html/public
      - key: SKIP_NPM
        value: "1"
      - key: SKIP_COMPOSER
        value: "1"
      - key: PHP_ERRORS_STDERR
        value: "1"
      - key: PORT
        value: "80"
      - key: APP_URL
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
